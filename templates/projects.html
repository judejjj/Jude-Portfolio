{% extends 'base.html' %}

{% block content %}
<div class="section-header text-center">
    <h1 class="page-title">My <span>Projects</span></h1>
    <p class="page-subtitle">A selection of my recent work in ML, Web Development, and Systems Engineering.</p>
</div>

<div class="projects-grid">
    {% for project in projects %}
    <div class="project-card">
        <div class="project-info">
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-desc">{{ project.description }}</p>
            <div style="margin-top: auto;">
                <a href="{{ project.link }}" target="_blank" class="project-link">
                    View on GitHub <i class="fab fa-github" style="margin-left: 5px;"></i>
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
